# Data configuration for PMP dataset

data:
  # Paths
  data_dir: data
  raw_dir: ${data.data_dir}/raw
  processed_dir: ${data.data_dir}/processed
  
  # Dataset
  batch_size: 4
  num_workers: 4
  pin_memory: true
  
  # Splits
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  
  # Features
  use_plm_embeddings: true
  use_md_features: false
  use_opm_features: true
  
  # Graph
  k_neighbors: 16
  edge_feature_dim: 40
  
  # Augmentation
  augmentation:
    rotate: true
    noise_sigma: 0.1
    edge_dropout: 0.1
    normalize: true
