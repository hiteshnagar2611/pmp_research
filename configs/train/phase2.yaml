# PMPGen Phase 2 training configuration

train:
  # Training loop
  max_epochs: 200
  max_steps: -1
  
  # Optimizer
  optimizer:
    type: adam
    lr: 3e-4
    betas: [0.9, 0.999]
    weight_decay: 1e-5
    eps: 1e-8
  
  # Learning rate scheduler
  lr_scheduler:
    type: cosine_with_warmup
    warmup_steps: 1000
    total_steps: 200000
    min_lr: 1e-6
  
  # Losses
  losses:
    flow_matching:
      weight: 1.0
      loss_type: l2              # l2 or huber
    anchor_preservation:
      weight: 0.5
      margin: 0.1
    membrane_geometry:
      weight: 0.3
      temperature: 1.0
    structural_validity:
      weight: 0.1
      bond_length_target: 3.8    # Angstroms
  
  # Training
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  log_every_n_steps: 10
  val_check_interval: 0.25
  
  # Checkpointing
  checkpoint_dir: outputs/checkpoints/phase2
  save_top_k: 3
  save_last: true
  early_stopping_patience: 15
  
  # Logging
  use_wandb: true
  wandb_project: pmp-research
  wandb_entity: null
  
  # Device
  devices: [0]
  strategy: auto
  precision: 32
  
  # Data
  batch_size: 4
  num_workers: 4
  pin_memory: true
  
  # Reproducibility
  seed: 42
  deterministic: true
  benchmark: false
